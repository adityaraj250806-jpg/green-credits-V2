<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Worker Dashboard | GreenCredits</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --dark: #111827;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #f0fdf4;
            color: #1f2937;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--dark);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-brand h1 {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .header-profile {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-info {
            text-align: right;
        }

        .profile-info h3 {
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .profile-info p {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: white;
        }

        /* Container & Tabs */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: white;
            padding: 10px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: #f3f4f6;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }

        .stat-info h4 {
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .stat-info p {
            color: #6b7280;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Report Cards */
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .report-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .report-card:hover {
            transform: translateY(-5px);
        }

        .report-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e5e7eb;
        }

        .report-content {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .report-id {
            font-weight: 700;
            color: var(--dark);
            font-size: 1.1rem;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-in-progress { background: #dbeafe; color: #1e40af; }
        .status-resolved { background: #d1fae5; color: #065f46; }
        .status-verified { background: #dcfce7; color: #166534; border: 1px solid #166534; }
        .status-rejected { background: #f3f4f6; color: #6b7280; text-decoration: line-through; }

        .report-desc {
            color: #4b5563;
            margin-bottom: 15px;
            line-height: 1.5;
            flex: 1;
        }

        .report-meta {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .report-meta i {
            width: 20px;
            color: var(--primary);
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-accept {
            background: #e0f2fe;
            color: #0284c7;
        }

        .btn-accept:hover { background: #bae6fd; }

        .btn-complete {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-complete:hover { transform: translateY(-2px); }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
            color: #9ca3af;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #e5e7eb;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; }
        .form-control {
            width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px;
            font-size: 1rem; transition: border-color 0.2s;
        }
        .form-control:focus { border-color: var(--primary); outline: none; }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 30px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; }
        .btn-cancel { background: #f3f4f6; color: #374151; }
        .btn-submit { background: var(--primary); color: white; }

    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-brand">
            <i class="fas fa-leaf" style="font-size: 1.8rem; color: var(--primary);"></i>
            <h1>Worker Portal</h1>
        </div>
        <div class="header-profile">
            <div class="profile-info">
                <h3 id="workerName">Worker Name</h3>
                <p><i class="fas fa-map-marker-alt"></i> <span id="workerZone">Zone 1</span></p>
            </div>
            <button class="btn-logout" onclick="workerLogout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="container">
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #d97706);"><i class="fas fa-clipboard-list"></i></div>
                <div class="stat-info">
                    <h4 id="pendingCount">0</h4>
                    <p>New Pending Tasks</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #3b82f6, #2563eb);"><i class="fas fa-hard-hat"></i></div>
                <div class="stat-info">
                    <h4 id="inProgressCount">0</h4>
                    <p>My Active Tasks</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #059669);"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info">
                    <h4 id="completedCount">0</h4>
                    <p>Completed (Resolved)</p>
                </div>
            </div>
        </div>

        <!-- Tabbed Workflow -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pending')" id="tab-pending">
                <i class="fas fa-inbox"></i> New Tasks
            </button>
            <button class="tab-btn" onclick="switchTab('in-progress')" id="tab-in-progress">
                <i class="fas fa-spinner fa-spin-hover"></i> My Active Tasks
            </button>
            <button class="tab-btn" onclick="switchTab('history')" id="tab-history">
                <i class="fas fa-history"></i> History
            </button>
        </div>

        <div id="reportsGrid" class="reports-grid">
            <!-- Populated by JS -->
            <div class="empty-state">
                <i class="fas fa-circle-notch fa-spin"></i>
                <h2>Loading tasks...</h2>
            </div>
        </div>
    </div>

    <!-- Complete Task Modal -->
    <div id="completionModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: var(--dark);"><i class="fas fa-camera-retro"></i> Upload Proof of Completion</h2>
            <form id="completionForm">
                <input type="hidden" id="completeReportId">

                <div class="form-group">
                    <label>After Photo (Required)</label>
                    <input type="file" id="completionPhoto" class="form-control" accept="image/*" required>
                </div>

                <div class="form-group">
                    <label>Completion Notes (Optional)</label>
                    <textarea id="completionNotes" class="form-control" rows="3" placeholder="Describe the cleanup work done..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal('completionModal')">Cancel</button>
                    <button type="submit" class="btn-submit" id="submitProofBtn"><i class="fas fa-upload"></i> Submit Proof</button>
                </div>
            </form>
            <div style="margin-top: 25px; text-align: center;">
                <p style="font-size: 0.85rem; color: #6b7280; margin-bottom: 10px;">Is this report fake, spam, or unreachable?</p>
                <button type="button" onclick="rejectTask()" style="background: none; border: 1px solid #ef4444; color: #ef4444; padding: 8px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                    <i class="fas fa-ban"></i> Report as Invalid
                </button>
            </div>
        </div>
    </div>

    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        let currentWorker = null;
        let allReports = [];
        let currentTab = 'pending';

        // Initialize Socket.io
        const socket = io();
        socket.on('newReport', () => { loadTasks(); });
        socket.on('reportUpdated', () => { loadTasks(); });

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            
            document.getElementById('completionForm').addEventListener('submit', handleCompletionSubmit);
        });

        async function checkAuth() {
            try {
                const response = await fetch('/api/worker/check-auth');
                const data = await response.json();

                if (data.success) {
                    currentWorker = data.worker;
                    document.getElementById('workerName').textContent = currentWorker.name;
                    document.getElementById('workerZone').textContent = currentWorker.zone;
                    loadTasks();
                } else {
                    window.location.href = '/worker-login.html';
                }
            } catch (error) {
                window.location.href = '/worker-login.html';
            }
        }

        async function workerLogout() {
            await fetch('/api/worker/logout', { method: 'POST' });
            window.location.href = '/worker-login.html';
        }

        async function loadTasks() {
            try {
                const response = await fetch('/api/worker/reports');
                const data = await response.json();

                if (data.success) {
                    allReports = data.reports || [];
                    
                    // The backend sends stats based on the worker's zone generally.
                    // We will recalculate stats purely for THIS worker to be 100% accurate.
                    
                    let pendingCount = 0;
                    let inProgressCount = 0;
                    let completedCount = 0;

                    allReports.forEach(r => {
                        if (r.status === 'pending') pendingCount++;
                        if (r.status === 'in-progress' && r.assignedTo === currentWorker.id) inProgressCount++;
                        if (r.status === 'resolved' || r.status === 'verified') completedCount++; // Show all resolved in history
                    });

                    document.getElementById('pendingCount').textContent = pendingCount;
                    document.getElementById('inProgressCount').textContent = inProgressCount;
                    document.getElementById('completedCount').textContent = completedCount;

                    renderReports();
                }
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderReports();
        }

        function renderReports() {
            const container = document.getElementById('reportsGrid');
            
            // Filter strictly based on tabs
            let filteredReports = [];
            
            if (currentTab === 'pending') {
                filteredReports = allReports.filter(r => r.status === 'pending');
            } else if (currentTab === 'in-progress') {
                // Only show in-progress tasks assigned to THIS specific worker
                filteredReports = allReports.filter(r => r.status === 'in-progress' && r.assignedTo === currentWorker.id);
            } else if (currentTab === 'history') {
                // Show resolved and verified
                filteredReports = allReports.filter(r => r.status === 'resolved' || r.status === 'verified' || r.status === 'rejected');
            }

            if (filteredReports.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-glass-cheers"></i>
                        <h2>No tasks here!</h2>
                        <p>You're all caught up in this section.</p>
                    </div>`;
                return;
            }

            container.innerHTML = filteredReports.map(report => {
                let actionBtn = '';
                
                if (currentTab === 'pending') {
                    actionBtn = `<button class="action-btn btn-accept" onclick="acceptTask('${report._id}')"><i class="fas fa-hand-paper"></i> Accept Task</button>`;
                } else if (currentTab === 'in-progress') {
                    actionBtn = `<button class="action-btn btn-complete" onclick="openCompletionModal('${report._id}')"><i class="fas fa-camera"></i> Upload Proof & Complete</button>`;
                }

                // Get Image
                let imgHtml = '';
                if (report.photoUrl) {
                    imgHtml = `<img src="${report.photoUrl}" class="report-img" loading="lazy">`;
                } else if (report.image) {
                    imgHtml = `<img src="${report.image}" class="report-img" loading="lazy">`;
                } else if (report.imageUrl) {
                    imgHtml = `<img src="${report.imageUrl}" class="report-img" loading="lazy">`;
                } else {
                    imgHtml = `<div class="report-img" style="display:flex; align-items:center; justify-content:center; background:#f3f4f6;"><i class="fas fa-image" style="font-size:3rem; color:#d1d5db;"></i></div>`;
                }

                // Maps link
                let mapLink = '';
                if (report.location && report.location.coordinates && report.location.coordinates[1] !== 0) {
                    mapLink = `<a href="https://www.google.com/maps?q=${report.location.coordinates[1]},${report.location.coordinates[0]}" target="_blank" style="color:var(--secondary); text-decoration:none;"><i class="fas fa-map-marked-alt"></i> View GPS Map</a>`;
                }

                // Worker Proof (After) HTML
                let workerProofHtml = '';
                if ((report.status === 'resolved' || report.status === 'verified') && (report.completionPhotoUrl || report.workerNotes)) {
                    workerProofHtml = `
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e5e7eb;">
                        <h4 style="font-size: 0.85rem; color: #6b7280; text-transform: uppercase; margin-bottom: 8px;"><i class="fas fa-camera"></i> After (Completion Proof)</h4>
                        ${report.completionPhotoUrl ? `<img src="${report.completionPhotoUrl}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; cursor: pointer;" onclick="window.open('${report.completionPhotoUrl}', '_blank')">` : ''}
                        ${report.workerNotes ? `<p style="font-size: 0.85rem; color: #4b5563; background: #f3f4f6; padding: 8px; border-radius: 6px; font-style: italic;">"${report.workerNotes}"</p>` : ''}
                    </div>
                    `;
                }

                return `
                <div class="report-card">
                    <div style="position: relative;">
                        <span style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; z-index: 10;"><i class="fas fa-exclamation-triangle"></i> Before</span>
                        ${imgHtml}
                    </div>
                    <div class="report-content">
                        <div class="report-header">
                            <span class="report-id">#${report.reportId}</span>
                            <span class="status-badge status-${report.status}">${report.status}</span>
                        </div>
                        <p class="report-desc">${report.description}</p>
                        
                        <div class="report-meta">
                            <div style="margin-bottom:8px;"><i class="fas fa-map-marker-alt"></i> ${report.address || 'Location provided via GPS'}</div>
                            ${mapLink ? `<div style="margin-bottom:8px;">${mapLink}</div>` : ''}
                            <div><i class="fas fa-clock"></i> ${new Date(report.createdAt).toLocaleDateString()}</div>
                        </div>
                        
                        ${workerProofHtml}
                        
                        <div style="margin-top:auto;">
                            ${actionBtn}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function acceptTask(id) {
            try {
                Swal.fire({ title: 'Accepting Task...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const response = await fetch(`/api/worker/reports/${id}/accept`, { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    Swal.fire('Task Accepted!', 'It is now in your Active Tasks.', 'success');
                    loadTasks();
                    switchTab('in-progress'); // Move them automatically to the active tab
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Connection failed', 'error');
            }
        }

        function openCompletionModal(id) {
            document.getElementById('completeReportId').value = id;
            document.getElementById('completionModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        async function handleCompletionSubmit(e) {
            e.preventDefault();
            const reportId = document.getElementById('completeReportId').value;
            const photoInput = document.getElementById('completionPhoto');
            const notes = document.getElementById('completionNotes').value;
            const submitBtn = document.getElementById('submitProofBtn');

            const formData = new FormData();
            formData.append('photo', photoInput.files[0]);
            formData.append('notes', notes);

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

                const response = await fetch(`/api/worker/reports/${reportId}/complete`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    closeModal('completionModal');
                    Swal.fire('Great Job!', 'Task marked as completed. Pending Admin Verification.', 'success');
                    loadTasks();
                    switchTab('history'); // Move to history
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Upload failed. Check connection.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-upload"></i> Submit Proof';
            }
        }

        async function rejectTask() {
            const id = document.getElementById('completeReportId').value;
            
            const { value: reason } = await Swal.fire({
                title: 'Report Invalid Task',
                input: 'text',
                inputLabel: 'Why is this task invalid? (e.g. Fake report, Location unreachable)',
                inputPlaceholder: 'Enter reason...',
                showCancelButton: true,
                confirmButtonColor: '#ef4444'
            });

            if (!reason) return;

            try {
                const res = await fetch('/api/universal/reject-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        reportId: id,
                        reason: reason,
                        rejectedByRole: 'Worker',
                        rejectorId: currentWorker.id
                    })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal('completionModal');
                    Swal.fire('Task Rejected', 'This task has been removed from the queue.', 'success');
                    loadTasks();
                    switchTab('history');
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            } catch (e) { 
                Swal.fire('Error', 'Connection error', 'error'); 
            }
        }
    </script>
</body>
</html>
